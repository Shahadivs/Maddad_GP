<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>مدد | MADDAD</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="page-shell">
    <div class="main-card">

      <div class="welcome-section">
        <img src="logo.png" alt="Maddad Logo" class="logo" />

        <h1 class="welcome-title">مرحباً بكم في تطبيق مدد</h1>

        <p class="welcome-text">
          مع مدد نساعدك على متابعة نمو طفلك واكتشاف احتياجاته
          خطوة بخطوة بطريقة سهلة ومريحة.
        </p>
      </div>

      <div class="user-section">
        <h2 class="user-heading">من المستخدم؟</h2>

        <div class="role-grid">
          <button class="role-card parent" onclick="goParent()">
            <div class="role-text">
              <h3>ولي الأمر</h3>
              <p>الدخول لإدارة الحساب والاستبيان والمتابعة</p>
            </div>
            <div class="role-icon">👨‍👩‍👧</div>
          </button>

          <button class="role-card child" onclick="goChild()">
            <div class="role-text">
              <h3>الطفل</h3>
              <p>الدخول إلى صفحة الألعاب والأنشطة</p>
            </div>
            <div class="role-icon">🧒</div>
          </button>
        </div>
      </div>

    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
